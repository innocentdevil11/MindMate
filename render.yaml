services:
  # Backend - FastAPI on Render Free Tier
  - type: web
    name: mindmate-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: BACKEND_CORS_ORIGINS
        value: https://mindmate.vercel.app,https://mind-mate-dusky.vercel.app,https://mind-mate-murex.vercel.app
      - key: BACKEND_CORS_ORIGIN_REGEX
        value: ^https://.*\.vercel\.app$
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0
    healthCheckPath: /health
